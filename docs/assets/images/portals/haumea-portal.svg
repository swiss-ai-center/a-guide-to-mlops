<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- HUD frame -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#333333" stroke-width="2" shape-rendering="crispEdges"/>
  <g stroke="#525252" stroke-width="2" shape-rendering="crispEdges">
    <line x1="200" y1="10" x2="200" y2="38"/>
    <line x1="200" y1="362" x2="200" y2="390"/>
    <line x1="10" y1="200" x2="38" y2="200"/>
    <line x1="362" y1="200" x2="390" y2="200"/>
  </g>
  <circle cx="200" cy="200" r="172" fill="none" stroke="#525252" stroke-width="1" stroke-dasharray="6 6" opacity="0.6"/>
  <!-- Haumea -->
  <g transform="rotate(-20 200 200)">
    <!-- Ring -->
    <ellipse cx="200" cy="200" rx="168" ry="34" fill="none" stroke="#d6d3d1" stroke-width="5" opacity="0.55"/>
    <!-- Body -->
    <ellipse cx="200" cy="200" rx="115" ry="58" fill="#e7e5e4" stroke="#a8a29e" stroke-width="2"/>
    <!-- Surface features -->
    <g fill="#78716c" opacity="0.5">
      <ellipse cx="150" cy="185" rx="28" ry="16"/>
      <ellipse cx="250" cy="215" rx="22" ry="12"/>
      <ellipse cx="200" cy="195" rx="18" ry="9"/>
    </g>
    <g fill="#57534e" opacity="0.25">
      <ellipse cx="170" cy="210" rx="14" ry="8"/>
      <ellipse cx="230" cy="188" rx="12" ry="7"/>
    </g>
    <!-- Highlight -->
    <ellipse cx="170" cy="180" rx="35" ry="18" fill="#ffffff" opacity="0.2"/>
  </g>
</svg>