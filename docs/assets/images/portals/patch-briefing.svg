<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Neutral backing so the patch reads on both dark and light themes -->
  <circle cx="200" cy="200" r="190" fill="#333333" opacity="0.65"/>

  <!-- Mission briefing patch: compass + todo list -->
  <g transform="translate(200, 200)">
    <!-- Compass rose -->
    <circle cx="-35" cy="-15" r="100" fill="none" stroke="#94a3b8" stroke-width="5"/>
    <circle cx="-35" cy="-15" r="85" fill="none" stroke="#94a3b8" stroke-width="2" opacity="0.4"/>

    <!-- Cardinal tick marks -->
    <g stroke="#94a3b8" stroke-width="4" stroke-linecap="round">
      <line x1="-35" y1="-115" x2="-35" y2="-95"/>
      <line x1="-35" y1="85" x2="-35" y2="65"/>
      <line x1="-135" y1="-15" x2="-115" y2="-15"/>
      <line x1="65" y1="-15" x2="45" y2="-15"/>
    </g>

    <!-- Cardinal letters -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" font-weight="700" fill="#94a3b8" text-anchor="middle">
      <text x="-35" y="-125" fill="#f59e0b">N</text>
      <text x="-35" y="105">S</text>
      <text x="-145" y="-10">W</text>
      <text x="75" y="-10">E</text>
    </g>

    <!-- Compass star -->
    <polygon points="-35,-95 -20,-35 40,-15 -20,5 -35,65 -50,5 -110,-15 -50,-35" fill="#f8fafc" stroke="#e5e5e5" stroke-width="2" opacity="0.95"/>

    <!-- North needle -->
    <polygon points="-35,-75 -25,-25 -35,-35 -45,-25" fill="#f59e0b"/>
    <polygon points="-35,45 -25,-5 -35,5 -45,-5" fill="#94a3b8"/>
    <circle cx="-35" cy="-15" r="10" fill="#0f172a" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="-32" cy="-18" r="3" fill="#ffffff" opacity="0.2"/>

    <!-- Todo list / mission checklist clipboard -->
    <g transform="translate(75, 75) rotate(-6)">
      <!-- Clipboard board -->
      <rect x="-55" y="-70" width="110" height="140" rx="6" fill="#f8fafc" stroke="#e5e5e5" stroke-width="3"/>

      <!-- Clip at top -->
      <rect x="-22" y="-82" width="44" height="18" rx="3" fill="#94a3b8"/>
      <rect x="-16" y="-78" width="32" height="8" rx="2" fill="#cbd5e1"/>

      <!-- Checklist items -->
      <g transform="translate(0, -45)">
        <!-- Item 1 -->
        <rect x="-38" y="0" width="14" height="14" rx="2" fill="none" stroke="#94a3b8" stroke-width="2"/>
        <polyline points="-35,4 -31,10 -25,2" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="-18" y1="7" x2="32" y2="7" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>

        <!-- Item 2 -->
        <rect x="-38" y="28" width="14" height="14" rx="2" fill="none" stroke="#94a3b8" stroke-width="2"/>
        <polyline points="-35,32 -31,38 -25,30" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="-18" y1="35" x2="32" y2="35" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>

        <!-- Item 3 -->
        <rect x="-38" y="56" width="14" height="14" rx="2" fill="none" stroke="#94a3b8" stroke-width="2"/>
        <line x1="-18" y1="63" x2="22" y2="63" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>

        <!-- Item 4 -->
        <rect x="-38" y="84" width="14" height="14" rx="2" fill="none" stroke="#94a3b8" stroke-width="2"/>
        <line x1="-18" y1="91" x2="18" y2="91" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Rocket accent in the upper-right quadrant -->
    <g transform="translate(75, -95) rotate(210) scale(1.7)">
      <polygon points="-8,7 -18,-3 -8,-1" fill="#a3a3a3"/>
      <polygon points="8,7 18,-3 8,-1" fill="#a3a3a3"/>
      <path d="M 0,36 L 8,-2 Q 0,-6 -8,-2 Z" fill="#f8fafc" stroke="#e5e5e5" stroke-width="1.5"/>
      <circle cx="0" cy="16" r="4" fill="#0f172a" stroke="#94a3b8" stroke-width="1"/>
      <path d="M -4,-2 Q -2,-10 0,-14 Q 2,-10 4,-2 Q 0,-6 -4,-2" fill="#f59e0b"/>
    </g>
  </g>
</svg>
