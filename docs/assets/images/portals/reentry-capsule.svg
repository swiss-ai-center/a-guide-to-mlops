<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- HUD frame -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#333333" stroke-width="2" shape-rendering="crispEdges"/>
  <g stroke="#525252" stroke-width="2" shape-rendering="crispEdges">
    <line x1="200" y1="10" x2="200" y2="38"/>
    <line x1="200" y1="362" x2="200" y2="390"/>
    <line x1="10" y1="200" x2="38" y2="200"/>
    <line x1="362" y1="200" x2="390" y2="200"/>
  </g>
  <circle cx="200" cy="200" r="172" fill="none" stroke="#525252" stroke-width="1" stroke-dasharray="6 6" opacity="0.6"/>

  <!-- Brutalist Dragon capsule -->
  <g transform="translate(200, 215)">
    <defs>
      <clipPath id="canopyClip">
        <path d="M -110 -135 A 110 70 0 0 1 110 -135 Z"/>
      </clipPath>
    </defs>

    <!-- Parachute cords -->
    <g stroke="#94a3b8" stroke-width="2" opacity="0.85">
      <line x1="-110" y1="-135" x2="-35" y2="-65"/>
      <line x1="110" y1="-135" x2="35" y2="-65"/>
      <line x1="0" y1="-205" x2="0" y2="-70"/>
    </g>

    <!-- Rounded parachute canopy with horizontal red / white bands -->
    <g clip-path="url(#canopyClip)">
      <rect x="-120" y="-205" width="240" height="14" fill="#ffffff"/>
      <rect x="-120" y="-191" width="240" height="14" fill="#da291c"/>
      <rect x="-120" y="-177" width="240" height="14" fill="#ffffff"/>
      <rect x="-120" y="-163" width="240" height="14" fill="#da291c"/>
      <rect x="-120" y="-149" width="240" height="14" fill="#ffffff"/>
    </g>
    <path d="M -110 -135 A 110 70 0 0 1 110 -135" fill="none" stroke="#e2e8f0" stroke-width="2"/>

    <!-- Entry flame trail -->
    <g fill="none" stroke="#ff6b2b" stroke-width="3" opacity="0.5" stroke-linecap="square">
      <line x1="-35" y1="95" x2="-45" y2="150"/>
      <line x1="0" y1="100" x2="0" y2="160"/>
      <line x1="35" y1="95" x2="45" y2="150"/>
    </g>

    <!-- Main triangular hull -->
    <path d="M 0 -70 L 80 70 L -80 70 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" stroke-linejoin="round"/>

    <!-- Panel seams -->
    <g stroke="#94a3b8" stroke-width="1.5" opacity="0.4" fill="none">
      <line x1="0" y1="-70" x2="0" y2="70"/>
      <line x1="0" y1="-70" x2="-40" y2="70"/>
      <line x1="0" y1="-70" x2="40" y2="70"/>
    </g>

    <!-- Window -->
    <circle cx="0" cy="-18" r="11" fill="#0f172a" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle cx="0" cy="-18" r="6" fill="#00f2ff" opacity="0.75"/>

    <!-- Swiss flag -->
    <g transform="translate(-12, 8)">
      <rect x="0" y="0" width="24" height="24" rx="2" fill="#da291c"/>
      <rect x="9" y="3" width="6" height="18" fill="#ffffff"/>
      <rect x="3" y="9" width="18" height="6" fill="#ffffff"/>
    </g>

    <!-- Heat shield / base -->
    <path d="M -63 40 L 63 40 L 80 70 Q 0 98 -80 70 Z" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>

    <!-- Landing legs -->
    <g stroke="#525252" stroke-width="4" stroke-linecap="square">
      <line x1="-80" y1="70" x2="-98" y2="90"/>
      <line x1="80" y1="70" x2="98" y2="90"/>
    </g>
    <g fill="#525252">
      <rect x="-106" y="86" width="14" height="8" rx="1"/>
      <rect x="92" y="86" width="14" height="8" rx="1"/>
    </g>
  </g>
</svg>
