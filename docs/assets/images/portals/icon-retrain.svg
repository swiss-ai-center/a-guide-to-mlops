<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Loop orbit -->
  <path d="M 120 140 C 50 140 50 280 120 280 C 170 280 170 220 120 220 C 95 220 95 260 120 260" fill="none" stroke="#f59e0b" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

  <!-- Arrow head -->
  <polygon points="120,290 140,270 100,270" fill="#f59e0b" opacity="0.7"/>

  <!-- Rocket -->
  <g transform="translate(120, 140) rotate(60)">
    <polygon points="-20,18 -44,-8 -20,-2" fill="#a3a3a3"/>
    <polygon points="20,18 44,-8 20,-2" fill="#a3a3a3"/>
    <path d="M 0,90 L 24,-4 Q 0,-14 -24,-4 Z" fill="#f8fafc" stroke="#e5e5e5" stroke-width="3"/>
    <circle cx="0" cy="45" r="10" fill="#0f172a" stroke="#94a3b8" stroke-width="2"/>
    <path d="M -11,-6 Q -6,-26 0,-34 Q 6,-26 11,-6 Q 0,-12 -11,-6" fill="#f59e0b"/>
  </g>

  <!-- Pluto dot -->
  <circle cx="260" cy="220" r="35" fill="#78716c" stroke="#57534e" stroke-width="3"/>
</svg>
