<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Brutalist yellow square brackets around the comet nucleus -->
  <g stroke="#f59e0b" stroke-width="4" fill="none" stroke-linecap="square" shape-rendering="crispEdges">
    <!-- Top-left corner -->
    <polyline points="125,150 125,125 150,125"/>
    <!-- Top-right corner -->
    <polyline points="250,125 275,125 275,150"/>
    <!-- Bottom-left corner -->
    <polyline points="125,250 125,275 150,275"/>
    <!-- Bottom-right corner -->
    <polyline points="250,275 275,275 275,250"/>
  </g>

  <!-- Comet -->
  <defs>
    <!-- Single straight dust tail -->
    <linearGradient id="dustTail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="20%" stop-color="#e0f2fe" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#93c5fd" stop-opacity="0.2"/>
      <stop offset="85%" stop-color="#3b82f6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </linearGradient>

    <!-- Coma glow -->
    <radialGradient id="comaGlow" cx="35%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#e0f2fe" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>

    <!-- Nucleus shading -->
    <radialGradient id="nucleusShade" cx="30%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="45%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#475569"/>
    </radialGradient>
  </defs>

  <!-- Comet oriented with tail at 20 degrees above horizontal -->
  <g transform="rotate(-20 200 200)">
    <!-- Flame-shaped tail wrapping around the back of the nucleus -->
    <path d="M 185 162
             C 230 150, 300 120, 440 95
             L 440 245
             C 300 220, 230 250, 185 238
             C 165 228, 158 210, 158 200
             C 158 190, 165 172, 185 162
             Z"
          fill="url(#dustTail)"/>

    <!-- Inner tail core -->
    <path d="M 200 178
             C 245 165, 320 145, 410 130
             L 410 220
             C 320 205, 245 235, 200 222
             C 185 215, 180 205, 180 200
             C 180 195, 185 185, 200 178
             Z"
          fill="#ffffff" opacity="0.12"/>

    <!-- Coma glow around back of nucleus -->
    <ellipse cx="225" cy="200" rx="60" ry="50" fill="url(#comaGlow)"/>

    <!-- Irregular comet nucleus -->
    <path d="M 165 195
             C 155 175, 170 155, 195 160
             C 215 150, 245 160, 255 185
             C 265 205, 255 235, 230 245
             C 205 255, 170 245, 155 225
             C 145 205, 150 200, 165 195 Z"
          fill="#64748b" stroke="#94a3b8" stroke-width="2"/>

    <!-- Craters and surface texture -->
    <g fill="#334155" opacity="0.45">
      <ellipse cx="185" cy="190" rx="14" ry="9" transform="rotate(-10 185 190)"/>
      <ellipse cx="225" cy="210" rx="10" ry="7"/>
      <ellipse cx="200" cy="230" rx="8" ry="5"/>
      <ellipse cx="235" cy="185" rx="7" ry="5" transform="rotate(15 235 185)"/>
    </g>

    <!-- Icy highlights -->
    <g fill="#e2e8f0" opacity="0.35">
      <ellipse cx="175" cy="185" rx="9" ry="5" transform="rotate(20 175 185)"/>
      <ellipse cx="230" cy="195" rx="11" ry="6"/>
      <ellipse cx="190" cy="215" rx="7" ry="4"/>
    </g>

    <!-- Small active jets on the sun-facing side -->
    <g fill="#e0f2fe" opacity="0.55">
      <circle cx="158" cy="182" r="4"/>
      <circle cx="152" cy="203" r="3"/>
      <circle cx="160" cy="220" r="3.5"/>
    </g>


  </g>
</svg>
