<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Parachute canopy -->
  <defs>
    <clipPath id="canopy">
      <path d="M 80 150 Q 200 40 320 150 Z"/>
    </clipPath>
  </defs>
  <g clip-path="url(#canopy)">
    <rect x="70" y="40" width="260" height="24" fill="#ffffff"/>
    <rect x="70" y="64" width="260" height="24" fill="#da291c"/>
    <rect x="70" y="88" width="260" height="24" fill="#ffffff"/>
    <rect x="70" y="112" width="260" height="24" fill="#da291c"/>
    <rect x="70" y="136" width="260" height="24" fill="#ffffff"/>
  </g>
  <path d="M 80 150 Q 200 40 320 150" fill="none" stroke="#b91c1c" stroke-width="4"/>
  <path d="M 200 100 L 200 150" stroke="#94a3b8" stroke-width="4" opacity="0.5"/>

  <!-- Parachute cords -->
  <g stroke="#94a3b8" stroke-width="4" opacity="0.85">
    <line x1="90" y1="150" x2="155" y2="255"/>
    <line x1="310" y1="150" x2="245" y2="255"/>
    <line x1="200" y1="150" x2="200" y2="255"/>
  </g>

  <!-- Capsule -->
  <path d="M 200 235 L 250 345 Q 200 365 150 345 Z" fill="#f8fafc" stroke="#e5e5e5" stroke-width="6"/>
  <circle cx="200" cy="295" r="20" fill="#0f172a" stroke="#94a3b8" stroke-width="4"/>
  <circle cx="208" cy="288" r="6" fill="#ffffff" opacity="0.2"/>
</svg>
