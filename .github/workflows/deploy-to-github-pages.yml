name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Linting job
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements-freeze.txt
      - name: Lint
        run: mdwrap --check docs presentation

  # Build Zensical job
  build-zensical:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
          cache: pip
      - uses: actions/cache@v5
        with:
          key: ${{ github.ref }}
          path: .cache
      - run: pip install -r requirements-freeze.txt
      - run: zensical build --clean
      - uses: actions/upload-artifact@v6
        with:
          name: zensical-files
          path: site
          if-no-files-found: error
          retention-days: 1

  # Build Marp job
  build-marp:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: docker://marpteam/marp-cli:v4.2.3
        with:
          args: --config .github/workflows/marp.config.js --html --output "presentation/index.html" "presentation/README.md"
        env:
          MARP_USER: root:root
      - uses: docker://marpteam/marp-cli:v4.2.3
        with:
          args: --config .github/workflows/marp.config.js --html --allow-local-files --jpeg-quality 100 --pdf --output "presentation/a-guide-to-mlops-presentation.pdf" "presentation/README.md"
        env:
          MARP_USER: root:root
      - uses: actions/upload-artifact@v6
        with:
          name: marp-files
          path: |
            presentation/images
            presentation/a-guide-to-mlops-presentation.pdf
            presentation/index.html
          if-no-files-found: error
          retention-days: 1

  merge-files-for-github-pages:
    runs-on: ubuntu-latest
    needs: [build-zensical, build-marp]
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: "*-files"

      - name: Merge files
        run: |
          # Move the Zensical site to the `public` directory
          mv zensical-files public

          # Check if the `presentation` directory already exists in the `public` directory
          if [ -d "public/presentation" ]; then
            echo "The 'presentation' directory already exists in the 'public' directory"
            exit 1
          fi

          # Move the Marp files to the `presentation` directory
          mv marp-files public/presentation

      - uses: actions/configure-pages@v6

      - name: Upload files to GitHub Pages
        # Only run on main
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  # Deployment job
  deploy:
    runs-on: ubuntu-latest
    needs: merge-files-for-github-pages
    # Only run on main
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
